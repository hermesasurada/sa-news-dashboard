<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SA Breaking News Dashboard</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
  background: #f4f6f9;
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: #374151;
  line-height: 1.65;
  padding: 16px;
  overflow-x: hidden;
  max-width: 100vw;
}

/* ── New Articles Banner ── */
#new-articles-banner {
  display: none;
  position: sticky;
  top: 0;
  z-index: 200;
  background: #1d4ed8;
  color: #fff;
  text-align: center;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.01em;
  margin: -16px -16px 16px;
}
#new-articles-banner:hover { background: #1e40af; }

/* ── Header ── */
.header {
  max-width: 1400px;
  margin: 0 auto 20px;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: #111827;
  margin-bottom: 12px;
}

/* ── Search Bar ── */
.search-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.search-bar input[type=text],
.search-bar select,
.search-bar input[type=date],
.btn-search,
.btn-reset,
.btn-sort {
  height: 38px;
  box-sizing: border-box;
}
.search-bar input[type=text] {
  flex: 1;
  min-width: 180px;
  padding: 0 12px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  background: #fff;
}
.search-bar input[type=text]:focus { border-color: #3b82f6; }
.search-bar select {
  padding: 0 10px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  background: #fff;
  cursor: pointer;
  outline: none;
}
.search-bar input[type=date] {
  padding: 0 10px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  background: #fff;
  outline: none;
}
.btn-search {
  padding: 0 16px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-search:hover { background: #2563eb; }
.btn-reset {
  padding: 0 12px;
  background: #f1f5f9;
  color: #475569;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}
.btn-reset:hover { background: #e2e8f0; }

/* ── 정렬 토글 버튼 ── */
.btn-sort {
  height: 38px;
  padding: 0 12px;
  background: #f1f5f9;
  color: #475569;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-sort:hover { background: #e2e8f0; }
.btn-sort.alt {
  background: #ede9fe;
  color: #5b21b6;
  border-color: #c4b5fd;
  font-weight: 600;
}

/* ── 미읽음 필터 토글 ── */
.btn-unread {
  height: 38px;
  padding: 0 14px;
  background: #f1f5f9;
  color: #475569;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-unread:hover { background: #e2e8f0; }
.btn-unread.active {
  background: #dbeafe;
  color: #1d4ed8;
  border-color: #93c5fd;
  font-weight: 600;
}

/* ── 휴지통 보기 토글 ── */
.btn-trash-view {
  height: 38px;
  width: 40px;
  padding: 0;
  background: #f1f5f9;
  color: #475569;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-left: auto;
}
.btn-trash-view:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }

/* ── 통계 페이지 진입 ── */
.btn-stats {
  height: 38px;
  padding: 0 13px;
  background: #eef2ff;
  color: #4338ca;
  border: 1px solid #c7d2fe;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  white-space: nowrap;
}
.btn-stats:hover { background: #e0e7ff; border-color: #a5b4fc; }
.btn-trash-view.active {
  background: #fee2e2;
  color: #b91c1c;
  border-color: #f87171;
}

/* ── 복원 버튼 (휴지통 카드) ── */
.restore-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #059669;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 6px;
}
.restore-btn:hover { color: #047857; }

/* ── 미읽음 카드 표시 ── */
.card-unread {
  border-left: 3px solid #3b82f6;
}
.unread-dot {
  width: 8px; height: 8px;
  background: #3b82f6;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}

/* ── 읽음 버튼 ── */
.read-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #f9fafb;
  color: #6b7280;
  cursor: pointer;
  padding: 0;
  font-size: 0;
  flex-shrink: 0;
  transition: all 0.15s ease;
}
.read-btn:hover { background: #dbeafe; border-color: #bfdbfe; color: #2563eb; }
.read-btn.done { color: #d1d5db; border-color: #e5e7eb; }
.read-btn.done:hover { background: #fef2f2; border-color: #fecaca; color: #dc2626; }

/* ── Stats ── */
.stats {
  max-width: 1400px;
  margin: 12px auto 16px;
  font-size: 13px;
  color: #6b7280;
}
.pending-badge {
  display: inline-block;
  margin-left: 8px;
  padding: 1px 7px;
  background: #fef3c7;
  color: #92400e;
  border: 1px solid #fcd34d;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  vertical-align: middle;
}
.unread-badge {
  display: inline-block;
  margin-left: 8px;
  padding: 1px 7px;
  background: #dbeafe;
  color: #1e40af;
  border: 1px solid #93c5fd;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  vertical-align: middle;
}

/* ── Layout ── */
.container {
  max-width: 760px;
  margin: 0 auto;
  width: 100%;
}
@media (min-width: 768px) {
  body { padding: 24px; }
  #new-articles-banner { margin: -24px -24px 24px; }
  .container {
    max-width: 1400px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
}

/* ── Card ── */
.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  overflow: visible;
  word-break: break-word;
  overflow-wrap: break-word;
  transition: box-shadow 0.2s, transform 0.2s;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.card-deleting {
  opacity: 0.35;
  pointer-events: none;
  border-color: #fca5a5;
  transform: scale(0.985);
  transition: opacity 0.2s, transform 0.2s, border-color 0.2s;
}
@media (min-width: 768px) {
  .card { margin-bottom: 0; }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .card-deleting:hover { transform: scale(0.985); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
}

/* ── Card Title Row (제목 + 미읽음 dot) ── */
.card-title-row {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  margin-bottom: 3px;
}
.card-title-row .unread-dot {
  margin-top: 6px;
  flex-shrink: 0;
}
.card-title-row .card-title {
  margin-bottom: 0;
  flex: 1;
}

/* ── Ticker Row ── */
.card-tickers {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
  margin-bottom: 0;
  align-items: center;
}

/* ── Ticker Badge ── */
.ticker-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: default;
}
.ticker-blue   { background: #dbeafe; color: #1e40af; }
.ticker-green  { background: #d1fae5; color: #065f46; }
.ticker-purple { background: #ede9fe; color: #5b21b6; }
.ticker-orange { background: #ffedd5; color: #9a3412; }
.ticker-yellow { background: #fef3c7; color: #92400e; }
.ticker-red    { background: #fee2e2; color: #991b1b; }
.ticker-gray   { background: #f1f5f9; color: #475569; }

/* ── Ticker 커스텀 툴팁 ── */
.ticker-badge[data-company] {
  position: relative;
}
.ticker-badge[data-company]::after {
  content: attr(data-company);
  position: absolute;
  bottom: calc(100% + 6px);
  /* 배지 왼쪽 모서리 기준으로 오른쪽으로 펼침 → 좌측 끝 배지에서도 화면 밖으로 안 나감 */
  left: 0;
  transform: scale(0.92);
  transform-origin: bottom left;
  background: #1f2937;
  color: #fff;
  padding: 4px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  max-width: 80vw;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.08s ease, transform 0.08s ease;
  z-index: 300;
}
.ticker-badge[data-company]:hover::after {
  opacity: 1;
  transform: scale(1);
}

/* ── Card Meta ── */
.card-source {
  font-size: 12px;
  color: #9ca3af;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.card-time {
  font-size: 11px;
  color: #c4c9d4;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
}

/* ── Card Meta (날짜 + 출처) ── */
.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 11px;
  color: #9ca3af;
}
.card-date { white-space: nowrap; }
.card-divider {
  border: none;
  border-top: 1px solid #f3f4f6;
  margin: 10px 0 12px;
}
.card-origin a {
  color: #9ca3af;
  text-decoration: none;
  font-weight: 500;
}
.card-origin a:hover { color: #3b82f6; text-decoration: underline; }

/* ── Card Title ── */
.card-title {
  font-size: 16px;
  color: #111827;
  font-weight: 700;
  margin-bottom: 3px;
  line-height: 1.5;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.card-orig-title {
  font-size: 12px;
  color: #9ca3af;
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 0;
  word-break: break-word;
}

/* ── Summary / Details ── */
.card-summary {
  font-size: 14px;
  color: #4b5563;
  margin-bottom: 10px;
  line-height: 1.7;
}
.card-summary strong { color: #111827; }
.card-details {
  font-size: 13px;
  color: #6b7280;
  line-height: 1.65;
}
.card-details strong { color: #374151; }
.card-details ul {
  padding-left: 16px;
  margin-top: 4px;
}
.card-details li {
  margin-bottom: 4px;
  overflow-wrap: break-word;
  word-break: keep-all;
}

/* ── Card Footer ── */
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 10px;
}
.footer-left {
  font-size: 10px;
  color: #c4c9d4;
  white-space: nowrap;
}
.footer-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ── Link Button (원문보기) ── */
.link-btn {
  font-size: 12px;
  color: #2563eb;
  text-decoration: none;
  padding: 5px 14px;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  background: #eff6ff;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.15s ease;
}
.link-btn:hover {
  background: #dbeafe;
  border-color: #60a5fa;
  transform: translateY(-1px);
}

/* ── Delete Button — icon only, desktop hover-show ── */
.delete-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border: 1px solid #fecaca;
  border-radius: 6px;
  background: #fef2f2;
  color: #dc2626;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, transform 0.15s, opacity 0.15s;
}
.delete-btn:hover {
  background: #fee2e2;
  border-color: #f87171;
  transform: translateY(-1px);
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1f2937;
  color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  transition: transform 0.25s ease, opacity 0.25s ease;
  opacity: 0;
  z-index: 1000;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.toast-action {
  background: none;
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;
}
.toast-action:hover { background: rgba(255,255,255,0.15); }

/* ── Mobile ── */
@media (max-width: 480px) {
  body { padding: 10px; }
  .card { padding: 14px; }
  .card-title { font-size: 15px; }
}

/* ── Pagination ── */
.pagination {
  max-width: 1400px;
  margin: 24px auto 0;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.pagination button {
  padding: 6px 14px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
}
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.pagination .page-info { font-size: 13px; color: #6b7280; }

/* ── Empty / Loading ── */
.empty-state {
  max-width: 1400px;
  margin: 60px auto;
  text-align: center;
  color: #9ca3af;
  font-size: 15px;
}

/* ── 티커 선택 버튼 ── */
.btn-ticker {
  height: 38px; padding: 0 13px;
  background: #fff; color: #374151;
  border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; white-space: nowrap; max-width: 170px;
}
.btn-ticker:hover { background: #f8fafc; }
.btn-ticker.active { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; font-weight: 600; }
.btn-ticker span { overflow: hidden; text-overflow: ellipsis; }

/* ── 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.45);
  z-index: 2000; align-items: flex-start; justify-content: center;
  padding: 56px 16px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 14px;
  width: 100%; max-width: 580px; max-height: 76vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.28); overflow: hidden;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 10px; }
.modal-head h3 { font-size: 16px; font-weight: 800; }
.modal-close { background: none; border: none; font-size: 17px; color: #94a3b8; cursor: pointer; line-height: 1; padding: 4px; }
.modal-close:hover { color: #475569; }
#ticker-search {
  margin: 0 18px 12px; height: 40px; padding: 0 14px;
  border: 1px solid #d1d5db; border-radius: 9px; font-size: 14px; outline: none;
}
#ticker-search:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.ticker-grid {
  overflow-y: auto; padding: 2px 18px 18px;
  display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
}
.tk-chip {
  padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
  background: #f8fafc; font-size: 13px; font-weight: 600; color: #334155;
  cursor: pointer; white-space: nowrap; display: inline-flex; align-items: baseline; gap: 5px;
}
.tk-chip:hover { background: #eef2ff; border-color: #c7d2fe; }
.tk-chip.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.tk-chip.all { background: #fff; border-style: dashed; }
.tk-chip.all.active { background: #3b82f6; color: #fff; border-style: solid; }
.tk-chip .sub { font-weight: 400; font-size: 11px; color: #94a3b8; }
.tk-chip.active .sub { color: #dbeafe; }
.tk-empty { color: #94a3b8; font-size: 13px; padding: 24px; text-align: center; width: 100%; }
</style>
</head>
<body>

<div id="new-articles-banner" onclick="dismissBanner()"></div>
<div id="toast"></div>

<div class="header">
  <h1>📰 SA Breaking News</h1>
  <div class="search-bar">
    <input type="text" id="q" placeholder="검색 (제목, 회사명, 티커, 요약...)" onkeydown="if(event.key==='Enter') search(0)" />
    <button class="btn-search" onclick="search(0)">검색</button>
    <input type="hidden" id="ticker-filter">
    <button type="button" class="btn-ticker" id="ticker-btn" onclick="openTickerModal()" title="티커 선택">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      <span id="ticker-btn-label">전체 티커</span>
    </button>
    <button class="btn-sort" id="sort-toggle" onclick="toggleSort()">
      <span id="sort-label">이메일시간순</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
    </button>
    <button class="btn-reset" onclick="reset()">초기화</button>
    <button class="btn-unread" id="unread-filter" onclick="toggleUnreadFilter()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      미읽음만
    </button>
    <button class="btn-trash-view" id="trash-view" onclick="toggleTrashView()" title="휴지통 (삭제된 기사)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>
    <a class="btn-stats" href="/stats" title="뉴스 통계">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      통계
    </a>
    <a class="btn-stats" href="/telegram" title="텔레그램 피드">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      텔레그램
    </a>

</div>

<!-- 티커 선택 모달 -->
<div id="ticker-modal" class="modal-overlay" onclick="if(event.target===this)closeTickerModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3>🏷️ 티커 선택</h3>
      <button class="modal-close" onclick="closeTickerModal()" aria-label="닫기">✕</button>
    </div>
    <input type="text" id="ticker-search" placeholder="티커 검색 (예: NVDA, 삼성, AIR.PA)" oninput="renderTickerList()" autocomplete="off" />
    <div id="ticker-list" class="ticker-grid"></div>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="container" id="cards"></div>
<div class="pagination" id="pagination"></div>

<script>
const PAGE_SIZE = 15;
let currentOffset = 0;
let currentSort = 'email_time_et';
let trashView = false;

/* ── SVG Icons ── */
const SVG_EYE = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const SVG_EYE_OFF = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const SVG_TRASH = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
const SVG_RESTORE = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`;

/* ── Filters ── */
let allTickers = [];

async function loadFilters() {
  try {
    const res = await fetch('/api/filters');
    const data = await res.json();
    allTickers = data.tickers || [];
    TICKER_ALIASES = data.aliases || {};   // db가 단일 소스
  } catch(e) { console.error('필터 로드 실패', e); }
}

/* ── 티커 선택 모달 ── */
// 해외상장 티커는 자국 표기(삼성전자 / AIR.PA)로 보여 가독성↑
function tickerDisplay(raw) {
  const fl = FOREIGN_LISTINGS[raw];
  return fl ? (fl.kr ? fl.name : fl.home) : raw;
}
function updateTickerLabel() {
  const val = document.getElementById('ticker-filter').value;
  const btn = document.getElementById('ticker-btn');
  const lbl = document.getElementById('ticker-btn-label');
  if (val) { lbl.textContent = tickerDisplay(val); btn.classList.add('active'); }
  else     { lbl.textContent = '전체 티커'; btn.classList.remove('active'); }
}
function openTickerModal() {
  document.getElementById('ticker-search').value = '';
  document.getElementById('ticker-modal').classList.add('show');
  renderTickerList();
  setTimeout(() => document.getElementById('ticker-search').focus(), 30);
}
function closeTickerModal() {
  document.getElementById('ticker-modal').classList.remove('show');
}
function setTicker(val) {
  document.getElementById('ticker-filter').value = val;
  updateTickerLabel();
  closeTickerModal();
  search(0);
}
function renderTickerList() {
  const q = document.getElementById('ticker-search').value.trim().toLowerCase();
  const cur = document.getElementById('ticker-filter').value;
  const matched = allTickers.filter(t => {
    if (!q) return true;
    const fl = FOREIGN_LISTINGS[t];
    const hay = (t + ' ' + (fl ? fl.home + ' ' + fl.name : '')).toLowerCase();
    return hay.includes(q);
  });
  const allChip = `<div class="tk-chip all ${!cur ? 'active' : ''}" onclick="setTicker('')">전체</div>`;
  if (matched.length === 0) {
    document.getElementById('ticker-list').innerHTML = allChip + '<div class="tk-empty">일치하는 티커가 없습니다</div>';
    return;
  }
  const chips = matched.map(t => {
    const fl = FOREIGN_LISTINGS[t];
    const sub = fl ? `<span class="sub">${fl.kr ? fl.name : fl.home}</span>` : '';
    return `<div class="tk-chip ${t === cur ? 'active' : ''}" onclick="setTicker('${t}')">${t}${sub}</div>`;
  }).join('');
  document.getElementById('ticker-list').innerHTML = allChip + chips;
}

/* ── Sort ── */
function toggleSort() {
  currentSort = currentSort === 'email_time_et' ? 'last_modified' : 'email_time_et';
  const btn = document.getElementById('sort-toggle');
  const label = document.getElementById('sort-label');
  if (currentSort === 'last_modified') {
    label.textContent = '수정시간순';
    btn.classList.add('alt');
  } else {
    label.textContent = '이메일시간순';
    btn.classList.remove('alt');
  }
  search(0);
}

/* ── Params ── */
function getParams(offset) {
  const p = new URLSearchParams();
  const q = document.getElementById('q').value.trim();
  const ticker = document.getElementById('ticker-filter').value;
  if (q) p.set('q', q);
  if (ticker) p.set('ticker', ticker);
  p.set('sort_by', currentSort);
  if (document.getElementById('unread-filter').classList.contains('active'))
    p.set('unread_only', 'true');
  if (trashView) p.set('deleted', 'true');
  p.set('limit', PAGE_SIZE);
  p.set('offset', offset);
  return p;
}

function formatTime(et) {
  if (!et) return '';
  const m = et.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}:\d{2})/);
  if (!m) return et;
  return `${m[2]}/${m[3]} ${m[4]}`;
}

// 동일 종목(클래스 차이) 병합 규칙 — 단일 소스는 db.TICKER_ALIASES.
// loadFilters()가 /api/filters에서 받아와 채움 (실패 시 빈 맵 = 병합 없이 원본 유지).
let TICKER_ALIASES = {};
const canonTicker = (t) => TICKER_ALIASES[t.toUpperCase()] || t;

// 미국 메인거래소(나스닥/NYSE) 미상장 — OTC ADR/해외상장 티커를 자국 시장 티커로 매핑.
//   kr:true  → 한글명 배지 + 마우스오버 티커 (한국 기업)
//   kr:false → 자국 티커 배지 + 마우스오버 영문 기업명 (그 외 외국 기업)
const FOREIGN_LISTINGS = {
  // 🇰🇷 한국
  SSNLF:{home:'005930.KS', name:'삼성전자', kr:true},
  HXSCL:{home:'000660.KS', name:'SK하이닉스', kr:true},
  LGEIY:{home:'066570.KS', name:'LG전자', kr:true},
  NHNCF:{home:'035420.KS', name:'네이버', kr:true},
  // 🇪🇺 유럽
  EADSY:{home:'AIR.PA', name:'Airbus'}, EADSF:{home:'AIR.PA', name:'Airbus'},
  ADDYY:{home:'ADS.DE', name:'Adidas'},
  BMWKY:{home:'BMW.DE', name:'BMW'},
  VWAGY:{home:'VOW3.DE', name:'Volkswagen'},
  SIEGY:{home:'SIE.DE', name:'Siemens'},
  DLAKF:{home:'LHA.DE', name:'Lufthansa'}, DLAKY:{home:'LHA.DE', name:'Lufthansa'},
  DHER:{home:'DHER.DE', name:'Delivery Hero'},
  SAFRF:{home:'SAF.PA', name:'Safran'}, SAFRY:{home:'SAF.PA', name:'Safran'},
  DUAVF:{home:'AM.PA', name:'Dassault Aviation'},
  ENI:{home:'ENI.MI', name:'Eni'},
  NTOIY:{home:'NESTE.HE', name:'Neste'},
  IBDRY:{home:'IBE.MC', name:'Iberdrola'}, IBDSF:{home:'IBE.MC', name:'Iberdrola'},
  CAMRF:{home:'CAMX.ST', name:'Camurus'},
  SAABF:{home:'SAAB-B.ST', name:'Saab'}, SAABY:{home:'SAAB-B.ST', name:'Saab'},
  RYCEY:{home:'RR.L', name:'Rolls-Royce'}, RYCEF:{home:'RR.L', name:'Rolls-Royce'},
  BAESY:{home:'BA.L', name:'BAE Systems'},
  HEINY:{home:'HEIA.AS', name:'Heineken'},
  RNMBF:{home:'RHM.DE', name:'Rheinmetall'}, RNMBY:{home:'RHM.DE', name:'Rheinmetall'},
  // 🇯🇵 일본
  NTDOY:{home:'7974.T', name:'Nintendo'}, NTDOF:{home:'7974.T', name:'Nintendo'},
  SFTBY:{home:'9984.T', name:'SoftBank Group'}, SFTBF:{home:'9984.T', name:'SoftBank Group'},
  NINOY:{home:'7731.T', name:'Nikon'},
  HTHIY:{home:'6501.T', name:'Hitachi'}, HTHIF:{home:'6501.T', name:'Hitachi'},
  // 🇨🇳🇹🇼🇭🇰
  BYDDY:{home:'1211.HK', name:'BYD'}, BYDDF:{home:'1211.HK', name:'BYD'},
  HNHPF:{home:'2317.TW', name:'Hon Hai (Foxconn)'},
  FXCOF:{home:'2354.TW', name:'Foxconn Technology'},
  IVBIY:{home:'1801.HK', name:'Innovent Biologics'}, IVBXF:{home:'1801.HK', name:'Innovent Biologics'},
  LNVGY:{home:'0992.HK', name:'Lenovo'},
  // 🌏 기타
  QABSY:{home:'QAN.AX', name:'Qantas'},
  SYAAF:{home:'SYR.AX', name:'Syrah Resources'}, SRHYY:{home:'SYR.AX', name:'Syrah Resources'},
  DBSDY:{home:'D05.SI', name:'DBS Group'},
  BDRBF:{home:'BBD-B.TO', name:'Bombardier'}, BDRAF:{home:'BBD-B.TO', name:'Bombardier'}, BOMBF:{home:'BBD-B.TO', name:'Bombardier'},
  KRKNF:{home:'PNG.V', name:'Kraken Robotics'},
  TAKOF:{home:'FLT.V', name:'Volatus Aerospace'},
};

function extractTickers(a) {
  const map = new Map();
  const rawTicker = (a.ticker || '').trim();
  if (rawTicker && rawTicker.toUpperCase() !== 'NONE') {
    const tks = rawTicker.split(/[,·\s]+/).map(t => t.trim()).filter(t => /^[A-Z0-9.]{1,6}$/.test(t));
    const names = (a.company_name || '').split(/·/).map(n => n.trim()).filter(Boolean);
    tks.forEach((t, i) => { const c = canonTicker(t); if (c && !map.has(c)) map.set(c, names[i] || names[0] || ''); });
  }
  const text = [a.summary_core || '', ...(a.summary_details || [])].join(' ');
  for (const m of text.matchAll(/\$([A-Z]{1,5})\b/g)) {
    const c = canonTicker(m[1]);
    if (!map.has(c)) map.set(c, '');
  }
  return [...map.entries()].map(([ticker, name]) => ({ ticker, name }));
}

/* ── Card Render ── */
function renderCard(a) {
  const details = a.summary_details.map(d => `<li>${d}</li>`).join('');
  const timeLabel = formatTime(a.email_time_et);
  const emailIdLabel = a.email_id ? `ID:${a.email_id}` : '';
  const footerMeta = [emailIdLabel, timeLabel].filter(Boolean).join(' · ');
  const isRead = !!a.is_read;
  const unreadDot = !isRead ? '<span class="unread-dot" title="미읽음"></span>' : '';
  const readBtnClass = isRead ? 'read-btn done' : 'read-btn';
  const readBtnTitle = isRead ? '읽음 취소' : '읽음 처리';
  const hasOrig = !!a.original_title;
  const originalTitle = hasOrig ? `<div class="card-orig-title">${a.original_title}</div>` : '';

  const tickers = extractTickers(a);
  const tickerBadges = tickers.map((t, i) => {
    const color = i === 0 ? (a.ticker_color || 'blue') : 'gray';
    const fl = FOREIGN_LISTINGS[t.ticker];
    let label, tipText;
    if (fl && fl.kr)   { label = fl.name; tipText = fl.home; }  // 한국: 한글명 + 티커 툴팁
    else if (fl)       { label = fl.home; tipText = fl.name; }  // 외국: 자국티커 + 영문명 툴팁
    else               { label = t.ticker; tipText = t.name; }  // 미국상장: 티커 + 회사명
    const tip = tipText ? ` data-company="${tipText}"` : '';
    return `<span class="ticker-badge ticker-${color}"${tip}>${label}</span>`;
  }).join('');

  // 키워드 태그는 표시하지 않음 — 티커 배지만 사용
  const combinedBadges = tickerBadges;

  return `
<div class="card${!isRead ? ' card-unread' : ''}" data-id="${a.id}" data-read="${isRead ? '1' : '0'}">
  <div class="card-title-row">
    ${unreadDot}
    <h2 class="card-title">${a.headline}</h2>
  </div>
  ${originalTitle}
  <hr class="card-divider">
  ${a.summary_core ? `<div class="card-summary"><strong>핵심</strong>&nbsp;${a.summary_core}</div>` : ''}
  <div class="card-details">
    ${a.summary_core ? '<strong>상세</strong>' : ''}
    <ul>${details}</ul>
  </div>
  ${combinedBadges ? `<div class="card-tickers">${combinedBadges}</div>` : ''}
  <div class="card-footer">
    <span class="footer-left">${footerMeta}</span>
    <div class="footer-actions">
      ${trashView ? '' : `<button class="${readBtnClass}" onclick="toggleRead(${a.id}, this)" title="${readBtnTitle}">${isRead ? SVG_EYE_OFF : SVG_EYE}</button>`}
      <a href="${a.article_url}" target="_blank" rel="noopener" class="link-btn">원문보기</a>
      ${trashView
        ? `<button class="restore-btn" onclick="restoreCard(${a.id}, this)" title="복원">${SVG_RESTORE}복원</button>`
        : `<button class="delete-btn" onclick="deleteCard(${a.id}, this)" title="삭제">${SVG_TRASH}</button>`}
    </div>
  </div>
</div>`;
}

/* ── Read Toggle ── */
async function toggleRead(id, btn) {
  const card = btn.closest('.card');
  const isCurrentlyRead = card.dataset.read === '1';
  const newRead = !isCurrentlyRead;
  try {
    const res = await fetch(`/api/articles/${id}/read`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({is_read: newRead}),
    });
    if (!res.ok) return;
    card.dataset.read = newRead ? '1' : '0';
    if (newRead) {
      card.classList.remove('card-unread');
      const dot = card.querySelector('.unread-dot');
      if (dot) dot.remove();
      btn.className = 'read-btn done';
      btn.title = '읽음 취소';
      btn.innerHTML = SVG_EYE_OFF;
      // #2: 미읽음 필터 활성 중이면 카드 즉시 제거
      if (document.getElementById('unread-filter').classList.contains('active')) {
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 300);
      }
    } else {
      card.classList.add('card-unread');
      const titleRow = card.querySelector('.card-title-row');
      if (titleRow) titleRow.insertAdjacentHTML('afterbegin', '<span class="unread-dot" title="미읽음"></span>');
      btn.className = 'read-btn';
      btn.title = '읽음 처리';
      btn.innerHTML = SVG_EYE;
    }
  } catch(e) { console.error('읽음 상태 변경 실패', e); }
}

/* ── #6: Delete (즉시 삭제) ── */
function deleteCard(articleId, element) {
  const card = element.closest('.card');
  if (card.dataset.deleting) return;
  card.dataset.deleting = '1';
  card.classList.add('card-deleting');

  fetch(`/api/articles/${articleId}`, { method: 'DELETE' })
    .then(res => {
      if (res.ok) {
        card.remove();
        // 즉시 삭제 완료 → 3초간 '취소' 버튼 노출
        showToast('기사를 삭제했습니다', '취소', () => undoDelete(articleId), 3000);
      } else {
        card.classList.remove('card-deleting');
        delete card.dataset.deleting;
        showToast('삭제 실패', null, null);
      }
    })
    .catch(() => {
      card.classList.remove('card-deleting');
      delete card.dataset.deleting;
      showToast('삭제 중 오류 발생', null, null);
    });
}

/* ── 삭제 취소(복원) ── */
function undoDelete(articleId) {
  fetch(`/api/articles/${articleId}/restore`, { method: 'POST' })
    .then(res => {
      if (res.ok) {
        search(currentOffset);  // 목록 새로고침 → 복원된 기사 다시 표시
      } else {
        showToast('취소 실패', null, null);
      }
    })
    .catch(() => showToast('취소 중 오류 발생', null, null));
}

/* ── Toast ── */
let _toastTimer = null;
let _toastUndoFn = null;

function showToast(message, actionLabel, actionFn, duration = 4500) {
  const toast = document.getElementById('toast');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastUndoFn = actionFn;
  toast.innerHTML = `<span>${message}</span>`
    + (actionLabel ? `<button class="toast-action" onclick="toastAction()">${actionLabel}</button>` : '');
  toast.classList.add('show');
  _toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    _toastUndoFn = null;
  }, duration);
}

function toastAction() {
  if (_toastUndoFn) _toastUndoFn();
  document.getElementById('toast').classList.remove('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastUndoFn = null;
}

/* ── Pagination ── */
function renderPagination(total, offset) {
  const pag = document.getElementById('pagination');
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const currentPage = Math.floor(offset / PAGE_SIZE);
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button onclick="search(${(currentPage-1)*PAGE_SIZE})" ${currentPage===0?'disabled':''}>◀ 이전</button>`;
  // 한 번에 최대 10개씩 블록 단위로 노출 (1~10, 11~20 …)
  const BLOCK = 10;
  const start = Math.floor(currentPage / BLOCK) * BLOCK;
  const end = Math.min(totalPages - 1, start + BLOCK - 1);
  for (let i = start; i <= end; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="search(${i*PAGE_SIZE})">${i+1}</button>`;
  }
  html += `<button onclick="search(${(currentPage+1)*PAGE_SIZE})" ${currentPage===totalPages-1?'disabled':''}>다음 ▶</button>`;
  html += `<span class="page-info">${total}건 / ${totalPages}페이지</span>`;
  pag.innerHTML = html;
}

/* ── #9: URL 상태 동기화 ── */
function syncURL(params) {
  const url = new URL(location.href);
  url.search = params.toString();
  history.replaceState(null, '', url.toString());
}

function restoreFromURL() {
  const sp = new URLSearchParams(location.search);
  if (sp.has('q'))           document.getElementById('q').value = sp.get('q');
  if (sp.has('ticker'))    { document.getElementById('ticker-filter').value = sp.get('ticker'); updateTickerLabel(); }
  if (sp.has('unread_only')) document.getElementById('unread-filter').classList.add('active');
  if (sp.get('sort_by') === 'last_modified') {
    currentSort = 'last_modified';
    document.getElementById('sort-label').textContent = '수정시간순';
    document.getElementById('sort-toggle').classList.add('alt');
  }
  return parseInt(sp.get('offset') || '0');
}

/* ── #7: 새 기사 알림 polling ── */
let lastKnownTotal = 0;

function showNewArticlesBanner(newCount) {
  const banner = document.getElementById('new-articles-banner');
  banner.textContent = `🆕 새 기사 ${newCount}건 도착 — 클릭해서 새로고침`;
  banner.style.display = 'block';
}

function dismissBanner() {
  document.getElementById('new-articles-banner').style.display = 'none';
  lastKnownTotal = 0;
  search(0);
}

function startNotificationPolling() {
  setInterval(async () => {
    if (lastKnownTotal === 0) return;
    try {
      const res = await fetch('/api/articles?limit=1&sort_by=last_modified');
      const { total } = await res.json();
      if (total > lastKnownTotal) {
        showNewArticlesBanner(total - lastKnownTotal);
      }
    } catch(e) {}
  }, 5 * 60 * 1000);
}

/* ── Search ── */
async function search(offset = 0) {
  currentOffset = offset;
  const params = getParams(offset);

  // #9: URL 동기화
  syncURL(params);

  const cardsEl = document.getElementById('cards');
  const statsEl = document.getElementById('stats');
  cardsEl.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  try {
    const [res, qRes] = await Promise.all([
      fetch('/api/articles?' + params.toString()),
      fetch('/api/queue_stats'),
    ]);
    const data = await res.json();
    const qData = await qRes.json();

    const pendingBadge = qData.pending > 0
      ? ` <span class="pending-badge">대기 ${qData.pending}건</span>`
      : '';
    const unreadBadge = qData.unread > 0
      ? ` <span class="unread-badge">안읽음 ${qData.unread}건</span>`
      : '';
    const badges = trashView ? '' : (pendingBadge + unreadBadge);
    const trashLabel = trashView ? '🗑 휴지통 · ' : '';

    if (data.items.length === 0) {
      cardsEl.innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      statsEl.innerHTML = (trashView ? '🗑 휴지통이 비어있습니다.' : '검색 결과가 없습니다.') + badges;
      return;
    }

    statsEl.innerHTML = trashLabel + `${data.total}건 (${offset+1}~${Math.min(offset+PAGE_SIZE, data.total)}번째)` + badges;
    cardsEl.innerHTML = data.items.map(renderCard).join('');
    renderPagination(data.total, offset);

    // #7: 필터 없는 1페이지 결과로 기준 total 갱신
    const qVal = document.getElementById('q').value.trim();
    const tVal = document.getElementById('ticker-filter').value;
    const uVal = document.getElementById('unread-filter').classList.contains('active');
    if (!qVal && !tVal && !uVal && offset === 0) {
      lastKnownTotal = data.total;
      document.getElementById('new-articles-banner').style.display = 'none';
    }
  } catch(e) {
    cardsEl.innerHTML = '<div class="empty-state">데이터를 불러오지 못했습니다.</div>';
    console.error(e);
  }
}

/* ── Filter Controls ── */
function toggleUnreadFilter() {
  document.getElementById('unread-filter').classList.toggle('active');
  search(0);
}

function toggleTrashView() {
  trashView = !trashView;
  document.getElementById('trash-view').classList.toggle('active', trashView);
  // 휴지통 보기에서는 미읽음 필터 해제 (혼동 방지)
  if (trashView) document.getElementById('unread-filter').classList.remove('active');
  search(0);
}

function reset() {
  document.getElementById('q').value = '';
  document.getElementById('ticker-filter').value = '';
  updateTickerLabel();
  currentSort = 'email_time_et';
  document.getElementById('sort-label').textContent = '이메일시간순';
  document.getElementById('sort-toggle').classList.remove('alt');
  document.getElementById('unread-filter').classList.remove('active');
  trashView = false;
  document.getElementById('trash-view').classList.remove('active');
  search(0);
}

/* ── 휴지통 카드 복원 ── */
function restoreCard(articleId, element) {
  const card = element.closest('.card');
  if (card.dataset.restoring) return;
  card.dataset.restoring = '1';
  card.classList.add('card-deleting');

  fetch(`/api/articles/${articleId}/restore`, { method: 'POST' })
    .then(res => {
      if (res.ok) {
        card.remove();
      } else {
        card.classList.remove('card-deleting');
        delete card.dataset.restoring;
        showToast('복원 실패', null, null);
      }
    })
    .catch(() => {
      card.classList.remove('card-deleting');
      delete card.dataset.restoring;
      showToast('복원 중 오류 발생', null, null);
    });
}

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') search(0);
});
// Esc로 티커 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeTickerModal();
});

/* ── Init ── */
async function init() {
  await loadFilters();             // 먼저 ticker 옵션 로드
  const savedOffset = restoreFromURL(); // URL → 필터 복원 (ticker 옵션 있어야 선택 가능)
  search(savedOffset);
  startNotificationPolling();
}
init();
</script>
